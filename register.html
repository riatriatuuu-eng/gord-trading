
<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GORD — تسجيل</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #e8f4fd; font-family: Arial; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
.card { background: #fff; border-radius: 16px; padding: 40px; width: 90%; max-width: 400px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); text-align: center; }
.logo { font-size: 36px; font-weight: 900; margin-bottom: 10px; }
.logo-go { color: #f0b90b; }
.logo-rd { color: #4a9edd; }
h2 { color: #1a1a2e; margin-bottom: 5px; }
p { color: #888; font-size: 14px; margin-bottom: 25px; }
input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 12px; font-size: 14px; text-align: right; }
.plan-select { display: flex; gap: 10px; margin-bottom: 20px; }
.plan-btn { flex: 1; padding: 10px; border: 2px solid #ddd; border-radius: 8px; cursor: pointer; font-size: 13px; background: #fff; }
.plan-btn.active { border-color: #4a9edd; background: #e8f4fd; color: #1a1a2e; font-weight: bold; }
.submit { width: 100%; padding: 14px; background: #f0b90b; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
.submit:hover { background: #d4a017; }
.login-link { margin-top: 15px; font-size: 13px; color: #888; }
.login-link a { color: #4a9edd; text-decoration: none; }
</style>
</head>
<body>
<div class="card">
  <div class="logo"><span class="logo-go">GO</span><span class="logo-rd">RD</span></div>
  <h2>إنشاء حساب جديد</h2>
  <p>اشترك وابدأ تلقى إشارات التداول</p>
  
  <input type="text" placeholder="الاسم الكامل" id="name" />
  <input type="email" placeholder="البريد الإلكتروني" id="email" />
  <input type="password" placeholder="كلمة المرور" id="password" />
  
  <div class="plan-select">
    <button class="plan-btn active" onclick="selectPlan(this, 'basic')">أساسي<br><small>29$/شهر</small></button>
    <button class="plan-btn" onclick="selectPlan(this, 'pro')">احترافي<br><small>59$/شهر</small></button>
    <button class="plan-btn" onclick="selectPlan(this, 'vip')">VIP<br><small>99$/شهر</small></button>
  </div>
  
  <button class="submit" onclick="register()">إنشاء الحساب والدفع</button>
  
  <div class="login-link">عندك حساب؟ <a href="#">سجل دخول</a></div>
</div>

<script>
let selectedPlan = 'basic';

function selectPlan(btn, plan) {
  document.querySelectorAll('.plan-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedPlan = plan;
}

function register() {
  const name = document.getElementById('name').value;
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  
  if (!name || !email || !password) {
    alert('يرجى ملء جميع الحقول');
    return;
  }
  
  alert('تم التسجيل! سيتم تحويلك لصفحة الدفع...');
}
</script>
</body>
</html>
