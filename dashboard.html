
<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GORD — داشبورد</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#fff;font-family:Arial}
canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;opacity:0.1}
.c{position:relative;z-index:1}
.header{background:rgba(0,0,0,0.9);padding:15px 20px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #1a3a5c}
.logo{font-size:28px;font-weight:900}
.go{color:#f0b90b}
.rd{color:#4a9edd}
.logout{background:transparent;border:1px solid #1a3a5c;color:#555;padding:8px 16px;border-radius:8px;cursor:pointer}
.welcome{background:rgba(0,10,30,0.9);color:#fff;padding:25px;text-align:center;border-bottom:1px solid #1a3a5c}
.welcome h2{color:#4a9edd}
.signals{padding:20px;max-width:800px;margin:0 auto}
.signals h3{margin-bottom:15px;color:#4a9edd;letter-spacing:2px}
.card{background:rgba(0,10,30,0.9);border-radius:12px;padding:25px;margin-bottom:15px;border:1px solid #1a3a5c;border-right:3px solid #4a9edd}
.ch{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.pair{font-size:22px;font-weight:bold;letter-spacing:1px}
.buy{background:rgba(0,200,81,0.15);color:#00c851;padding:6px 18px;border-radius:20px;font-size:14px;border:1px solid #00c851}
.sell{background:rgba(229,57,53,0.15);color:#e53935;padding:6px 18px;border-radius:20px;font-size:14px;border:1px solid #e53935}
.grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:15px}
.d{text-align:center;background:rgba(255,255,255,0.03);padding:12px;border-radius:8px;border:1px solid #1a3a5c}
.dl{color:#555;font-size:11px;letter-spacing:1px}
.dv{font-weight:bold;margin-top:5px;font-size:15px}
.wr{color:#4a9edd;font-size:20px}
.cf{font-size:12px;color:#444;display:flex;justify-content:space-between;padding-top:12px;border-top:1px solid #1a3a5c}
.loading{text-align:center;color:#333;padding:40px;letter-spacing:2px}
</style>
</head>
<body>
<canvas id="g"></canvas>
<div class="c">
<div class="header">
<div class="logo"><span class="go">GO</span><span class="rd">RD</span></div>
<button class="logout" onclick="logout()">خروج</button>
</div>
<div class="welcome">
<h2>مرحباً بك في GORD 🎉</h2>
<p style="color:#555;margin-top:5px">آخر الإشارات المباشرة</p>
</div>
<div class="signals">
<h3>LIVE SIGNALS</h3>
<div id="sc"><div class="loading">LOADING...</div></div>
</div>
</div>
<script>
const c=document.getElementById('g');
const x=c.getContext('2d');
c.width=window.innerWidth;c.height=window.innerHeight;
function dg(){x.clearRect(0,0,c.width,c.height);x.strokeStyle='#4a9edd';x.lineWidth=0.5;
for(let i=0;i<c.width;i+=40){x.beginPath();x.moveTo(i,0);x.lineTo(i,c.height);x.stroke();}
for(let i=0;i<c.height;i+=40){x.beginPath();x.moveTo(0,i);x.lineTo(c.width,i);x.stroke();}}
dg();

const sb=window.supabase.createClient(
'https://xrjawenxsrionlowhcgc.supabase.co',
'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhyamF3ZW54c3Jpb25sb3doY2djIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3Nzc2ODY4NiwiZXhwIjoyMDkzMzQ0Njg2fQ.M1GyJizVUZbEoN6i1gzuEn5Vb1pNZiUubTkefHyXauY'
);

async function checkAuth(){
const{data:{session}}=await sb.auth.getSession();
if(!session){window.location.href='login.html';}
}

async function logout(){
await sb.auth.signOut();
window.location.href='login.html';
}

async function loadSignals(){
try{
const r=await fetch('signals.json');
const s=await r.json();
const el=document.getElementById('sc');
if(!s.length){el.innerHTML='<div class="loading">NO SIGNALS YET</div>';return;}
el.innerHTML=s.map(i=>`
<div class="card">
<div class="ch"><div class="pair">${i.symbol}</div>
<div class="${i.direction==='شراء'?'buy':'sell'}">${i.direction}</div></div>
<div class="grid">
<div class="d"><div class="dl">WIN RATE</div><div class="dv wr">${i.score}%</div></div>
<div class="d"><div class="dl">TARGET</div><div class="dv">${i.tp}</div></div>
<div class="d"><div class="dl">STOP LOSS</div><div class="dv">${i.sl}</div></div>
</div>
<div class="cf"><span>📐 ${i.classic}</span><span>🕯 ${i.candle}</span><span>🕐 ${i.time}</span></div>
</div>`).join('');
}catch(e){document.getElementById('sc').innerHTML='<div class="loading">NO SIGNALS</div>';}
}

checkAuth();
loadSignals();
</script>
</body>
</html>
