
<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GORD — تسجيل الدخول</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #e8f4fd; font-family: Arial; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
.card { background: #fff; border-radius: 16px; padding: 40px; width: 90%; max-width: 400px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); text-align: center; }
.logo { font-size: 36px; font-weight: 900; margin-bottom: 10px; }
.logo-go { color: #f0b90b; }
.logo-rd { color: #4a9edd; }
h2 { color: #1a1a2e; margin-bottom: 5px; }
p { color: #888; font-size: 14px; margin-bottom: 25px; }
input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 12px; font-size: 14px; text-align: right; }
.submit { width: 100%; padding: 14px; background: #f0b90b; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
.msg { margin-top: 15px; font-size: 13px; color: #e53935; }
.register-link { margin-top: 15px; font-size: 13px; color: #888; }
.register-link a { color: #4a9edd; text-decoration: none; }
</style>
</head>
<body>
<div class="card">
  <div class="logo"><span class="logo-go">GO</span><span class="logo-rd">RD</span></div>
  <h2>تسجيل الدخول</h2>
  <p>ادخل بياناتك للوصول للإشارات</p>
  <input type="email" placeholder="البريد الإلكتروني" id="email" />
  <input type="password" placeholder="كلمة المرور" id="password" />
  <button class="submit" onclick="login()">دخول</button>
  <div class="msg" id="msg"></div>
  <div class="register-link">ما عندك حساب؟ <a href="register.html">سجل الآن</a></div>
</div>

<script>
const supabase = window.supabase.createClient(
  'https://xrjawenxsrionlowhcgc.supabase.co',
  'sb_publishable_JTj1NmsW1Og3_qDl86PKEA_PfKqEkJS'
);

async function login() {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  
  if (!email || !password) {
    document.getElementById('msg').textContent = 'يرجى ملء جميع الحقول';
    return;
  }

  const { data, error } = await supabase.auth.signInWithPassword({ email, password });
  
  if (error) {
    document.getElementById('msg').textContent = 'بيانات خاطئة، حاول مرة ثانية';
  } else {
    window.location.href = 'dashboard.html';
  }
}
</script>
</body>
</html>
